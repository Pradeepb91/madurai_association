{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg">

                <div class="card-header bg-primary text-white text-center">

                    <h3>🔐 Association Portal Login</h3>

                </div>

                <div class="card-body">

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Username

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a href="{% url 'home' %}"
                       class="btn btn-outline-secondary">

                        ⬅ Back to Home

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
